[platformio]
default_envs = custom_f446re_s01

[env:custom_f446re_base]
platform = ststm32
board = genericSTM32F446RE
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
monitor_filters = time, colorize
monitor_eol = LF
board_build.f_cpu = 180000000L
build_flags = 
	-D HSE_VALUE=16000000U
	-D HAL_CAN_MODULE_ENABLED
build_src_filter =
	+<*>
	-<tmag_calibration_runner/>
lib_deps = 
	https://github.com/simplefoc/Arduino-FOC/archive/refs/tags/v2.3.3.zip
	pazi88/STM32_CAN@^1.2.2

[env:custom_f446re_s01]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=1
	-D BUILD_MOTOR_TO_OUTPUT_SIGN=-1

[env:custom_f446re_s02]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=2

[env:custom_f446re_s03]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=3

[env:custom_f446re_s04]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=4
	-D BUILD_MOTOR_TO_OUTPUT_SIGN=-1

[env:custom_f446re_d01]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=5
	-D BUILD_POLE_PAIRS=21
	-D BUILD_DEFAULT_OUTPUT_ENCODER_TYPE=0
	-D BUILD_GEAR_RATIO=5.2f
	-D BUILD_ALIGN_VOLTAGE=5.0f
	-D BUILD_TORQUE_LIMIT_VOLTS=30.0f
	-D BUILD_MOTOR_VELOCITY_PID_P=0.18f
	-D BUILD_MOTOR_VELOCITY_PID_I=7.0f
	-D BUILD_MOTOR_VELOCITY_PID_D=0.0f
	-D BUILD_MOTOR_VELOCITY_LPF_TF=0.01f

[env:custom_f446re_d02]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=6
	-D BUILD_POLE_PAIRS=21
	-D BUILD_DEFAULT_OUTPUT_ENCODER_TYPE=0
	-D BUILD_GEAR_RATIO=5.2f
	-D BUILD_ALIGN_VOLTAGE=5.0f
	-D BUILD_TORQUE_LIMIT_VOLTS=30.0f
	-D BUILD_MOTOR_VELOCITY_PID_P=0.18f
	-D BUILD_MOTOR_VELOCITY_PID_I=7.0f
	-D BUILD_MOTOR_VELOCITY_PID_D=0.0f
	-D BUILD_MOTOR_VELOCITY_LPF_TF=0.01f

[env:custom_f446re_d03]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=7
	-D BUILD_POLE_PAIRS=21
	-D BUILD_DEFAULT_OUTPUT_ENCODER_TYPE=0
	-D BUILD_GEAR_RATIO=5.2f
	-D BUILD_ALIGN_VOLTAGE=5.0f
	-D BUILD_TORQUE_LIMIT_VOLTS=30.0f
	-D BUILD_MOTOR_VELOCITY_PID_P=0.18f
	-D BUILD_MOTOR_VELOCITY_PID_I=7.0f
	-D BUILD_MOTOR_VELOCITY_PID_D=0.0f
	-D BUILD_MOTOR_VELOCITY_LPF_TF=0.01f

[env:custom_f446re_d04]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=8
	-D BUILD_POLE_PAIRS=21
	-D BUILD_DEFAULT_OUTPUT_ENCODER_TYPE=0
	-D BUILD_GEAR_RATIO=5.2f
	-D BUILD_ALIGN_VOLTAGE=5.0f
	-D BUILD_TORQUE_LIMIT_VOLTS=30.0f
	-D BUILD_MOTOR_VELOCITY_PID_P=0.18f
	-D BUILD_MOTOR_VELOCITY_PID_I=7.0f
	-D BUILD_MOTOR_VELOCITY_PID_D=0.0f
	-D BUILD_MOTOR_VELOCITY_LPF_TF=0.01f

[env:tmag_calibration_runner_f446re]
platform = ststm32
board = genericSTM32F446RE
framework = arduino
upload_protocol = stlink
debug_tool = stlink
board_build.f_cpu = 180000000L
build_flags =
	-D HSE_VALUE=16000000U
	-D HAL_CAN_MODULE_ENABLED
	-D BUILD_CAN_NODE_ID=7
lib_deps =
	https://github.com/simplefoc/Arduino-FOC/archive/refs/tags/v2.3.3.zip
	pazi88/STM32_CAN@^1.2.2
build_src_filter =
	-<*>
	+<can_transport.cpp>
	+<config/actuator_defaults.cpp>
	+<fm25cl64b_fram.cpp>
	+<sensors/tmag_calibration_builder.cpp>
	+<storage/config_store.cpp>
	+<tmag5170_spi.cpp>
	+<tmag_calibration_runner/main.cpp>
