[platformio]
default_envs = custom_f446re_s01

[env:custom_f446re_base]
platform = ststm32
board = genericSTM32F446RE
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
monitor_filters = time, colorize
monitor_eol = LF
board_build.f_cpu = 180000000L
build_flags = 
	-D HSE_VALUE=16000000U
	-D HAL_CAN_MODULE_ENABLED
build_src_filter =
	+<*>
	-<fram_self_test.cpp>
	-<fram_test/>
	-<fram_erase/>
	-<tmag_self_test.cpp>
	-<tmag_calibration_runner/>
	-<tmag_test/>
	-<tmag_sensor_test/>
	-<tmag_lut_angle_test/>
	-<tmag_xyz_live_test/>
lib_deps = 
	https://github.com/simplefoc/Arduino-FOC/archive/refs/tags/v2.3.3.zip
	pazi88/STM32_CAN@^1.2.2

[env:custom_f446re_s01]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=1

[env:custom_f446re_s02]
extends = env:custom_f446re_base
build_flags =
	${env:custom_f446re_base.build_flags}
	-D BUILD_CAN_NODE_ID=2

